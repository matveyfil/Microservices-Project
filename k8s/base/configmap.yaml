apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: restaurant
data:
  ORDER_DB_URL: "postgresql+asyncpg://postgres:postgres@postgres-order:5432/orderdb?ssl=disable"
  INVENTORY_DB_URL: "postgresql+asyncpg://postgres:postgres@postgres-inventory:5432/inventorydb?ssl=disable"
  BILLING_DB_URL: "postgresql+asyncpg://postgres:postgres@postgres-billing:5432/billingdb?ssl=disable"
  RESERVATION_DB_URL: "postgresql+asyncpg://postgres:postgres@postgres-reservation:5432/reservationdb?ssl=disable"
  REDIS_URL: "redis://redis:6379"
  INVENTORY_SERVICE_URL: "http://inventory-service:8002"
  BILLING_SERVICE_URL: "http://billing-service:8003"
