apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-service
  namespace: restaurant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservation-service
      version: v1
  template:
    metadata:
      labels:
        app: reservation-service
        version: v1
    spec:
      serviceAccountName: reservation-service
      containers:
        - name: reservation-service
          image: microservices-project-reservation-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8004
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: RESERVATION_DB_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
